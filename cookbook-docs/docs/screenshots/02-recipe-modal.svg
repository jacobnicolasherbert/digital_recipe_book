<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <filter id="modal-shadow">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="rgba(44,31,14,0.30)"/>
    </filter>
    <linearGradient id="hero-img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9b89a"/>
      <stop offset="100%" stop-color="#b0a080"/>
    </linearGradient>
    <linearGradient id="img-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="40%" stop-color="rgba(44,31,14,0.05)"/>
      <stop offset="100%" stop-color="rgba(247,240,230,0.92)"/>
    </linearGradient>
  </defs>

  <!-- Blurred background (app page) -->
  <rect width="1280" height="800" fill="#f7f0e6"/>
  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#e8e0d4"/>
  <circle cx="24" cy="20" r="6" fill="#ff6057"/>
  <circle cx="48" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="20" r="6" fill="#28c840"/>
  <rect x="180" y="10" width="920" height="22" rx="11" fill="#d9d1c5"/>
  <text x="640" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8a7d6e">localhost:3000</text>

  <!-- Dimmed overlay -->
  <rect x="0" y="40" width="1280" height="760" fill="rgba(44,31,14,0.52)"/>

  <!-- Modal -->
  <g filter="url(#modal-shadow)">
    <rect x="200" y="60" width="880" height="710" rx="16" fill="#f7f0e6"/>

    <!-- Hero image -->
    <rect x="200" y="60" width="880" height="240" rx="16" fill="url(#hero-img)"/>
    <rect x="200" y="60" width="880" height="6" rx="3" fill="url(#hero-img)"/>
    <!-- Soft food texture detail lines -->
    <ellipse cx="640" cy="160" rx="120" ry="80" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="500" cy="140" rx="60" ry="40" fill="rgba(255,255,255,0.06)"/>
    <ellipse cx="780" cy="180" rx="70" ry="45" fill="rgba(255,255,255,0.06)"/>
    <text x="640" y="175" text-anchor="middle" font-size="52" fill="rgba(255,255,255,0.25)">🍋</text>
    <!-- Image gradient overlay -->
    <rect x="200" y="60" width="880" height="240" fill="url(#img-gradient)"/>

    <!-- Controls: Edit + Close -->
    <rect x="1010" y="76" width="56" height="28" rx="6" fill="rgba(247,240,230,0.92)" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="1038" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#2c1f0e">✎ Edit</text>
    <circle cx="1096" cy="90" r="14" fill="rgba(247,240,230,0.92)" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="1096" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">✕</text>

    <!-- Body -->
    <!-- Tags -->
    <rect x="228" y="320" width="60" height="20" rx="10" fill="#ede0cc" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
    <text x="258" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a3e28">Desserts</text>
    <rect x="296" y="320" width="54" height="20" rx="10" fill="#ede0cc" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
    <text x="323" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a3e28">Baking</text>

    <!-- Title -->
    <text x="228" y="380" font-family="Georgia, serif" font-size="38" font-style="italic" font-weight="700" fill="#2c1f0e">Classic Lemon Tart</text>

    <!-- Stats bar -->
    <rect x="228" y="400" width="300" height="56" rx="10" fill="none" stroke="rgba(44,31,14,0.15)" stroke-width="1"/>
    <line x1="328" y1="400" x2="328" y2="456" stroke="rgba(44,31,14,0.15)" stroke-width="1"/>
    <line x1="428" y1="400" x2="428" y2="456" stroke="rgba(44,31,14,0.15)" stroke-width="1"/>
    <text x="278" y="422" text-anchor="middle" font-family="sans-serif" font-size="9" letter-spacing="1.5" fill="#5a3e28" opacity="0.65">SERVES</text>
    <text x="278" y="443" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#2c1f0e">6</text>
    <text x="378" y="422" text-anchor="middle" font-family="sans-serif" font-size="9" letter-spacing="1.5" fill="#5a3e28" opacity="0.65">INGREDIENTS</text>
    <text x="378" y="443" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#2c1f0e">8</text>
    <text x="478" y="422" text-anchor="middle" font-family="sans-serif" font-size="9" letter-spacing="1.5" fill="#5a3e28" opacity="0.65">STEPS</text>
    <text x="478" y="443" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="600" fill="#2c1f0e">5</text>

    <!-- Divider -->
    <line x1="228" y1="480" x2="590" y2="480" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
    <text x="640" y="484" text-anchor="middle" font-size="11" fill="#c49a3c">✦</text>
    <line x1="690" y1="480" x2="1052" y2="480" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>

    <!-- Two-column content -->
    <!-- Ingredients column -->
    <text x="228" y="518" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#b84c21">Ingredients</text>
    <text x="228" y="544" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="544" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">200g plain flour</text>
    <text x="228" y="564" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="564" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">100g cold butter, cubed</text>
    <text x="228" y="584" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="584" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">3 large eggs</text>
    <text x="228" y="604" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="604" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">150ml double cream</text>
    <text x="228" y="624" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="624" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">150g caster sugar</text>
    <text x="228" y="644" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="644" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Zest &amp; juice of 3 lemons</text>
    <text x="228" y="664" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="664" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">1 tsp vanilla extract</text>
    <text x="228" y="684" font-family="sans-serif" font-size="12" fill="#c49a3c">—</text>
    <text x="244" y="684" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Pinch of salt</text>

    <!-- Method column -->
    <text x="560" y="518" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#b84c21">Method</text>
    <!-- Step 1 -->
    <circle cx="578" cy="540" r="11" fill="#b84c21"/>
    <text x="578" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#fff">1</text>
    <text x="597" y="536" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Rub the butter into the flour until it resembles</text>
    <text x="597" y="552" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">breadcrumbs. Add a pinch of salt.</text>
    <!-- Step 2 -->
    <circle cx="578" cy="582" r="11" fill="#b84c21"/>
    <text x="578" y="586" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#fff">2</text>
    <text x="597" y="578" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Press the pastry into a 23cm tart tin and chill</text>
    <text x="597" y="594" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">for 30 minutes.</text>
    <!-- Step 3 -->
    <circle cx="578" cy="624" r="11" fill="#b84c21"/>
    <text x="578" y="628" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#fff">3</text>
    <text x="597" y="620" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Blind bake at 190°C for 15 minutes, then</text>
    <text x="597" y="636" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">remove the weights and bake 5 minutes more.</text>
    <!-- Step 4 -->
    <circle cx="578" cy="666" r="11" fill="#b84c21"/>
    <text x="578" y="670" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#fff">4</text>
    <text x="597" y="662" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Whisk eggs, cream, sugar and lemon together.</text>
    <text x="597" y="678" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Pour into the pastry shell.</text>
    <!-- Step 5 -->
    <circle cx="578" cy="706" r="11" fill="#b84c21"/>
    <text x="578" y="710" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#fff">5</text>
    <text x="597" y="702" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Bake at 150°C for 25–30 minutes until just set.</text>
    <text x="597" y="718" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Cool completely before serving.</text>

    <!-- AI substitution panel (collapsed) -->
    <rect x="200" y="740" width="880" height="30" fill="none" stroke="rgba(44,31,14,0.12)" stroke-width="1"/>
    <rect x="200" y="740" width="880" height="30" rx="0" fill="rgba(196,154,60,0.05)"/>
    <text x="232" y="759" font-family="serif" font-size="11" fill="#c49a3c">✦</text>
    <text x="250" y="759" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2c1f0e">Ask about substitutions</text>
    <text x="900" y="759" font-family="sans-serif" font-size="10" fill="#5a3e28" opacity="0.55">Powered by DeepSeek AI</text>
    <text x="1055" y="759" font-family="sans-serif" font-size="10" fill="#5a3e28">∨</text>
  </g>
</svg>
