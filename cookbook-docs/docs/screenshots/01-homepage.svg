<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <filter id="shadow-card">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(44,31,14,0.10)"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(44,31,14,0.07)"/>
    </filter>
    <linearGradient id="hero-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(196,154,60,0.13)"/>
      <stop offset="100%" stop-color="rgba(247,240,230,0)"/>
    </linearGradient>
    <linearGradient id="card-img-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9c9b0"/>
      <stop offset="100%" stop-color="#c4b49a"/>
    </linearGradient>
    <linearGradient id="card-img-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9d4b8"/>
      <stop offset="100%" stop-color="#b0bf98"/>
    </linearGradient>
    <linearGradient id="card-img-3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4bfa8"/>
      <stop offset="100%" stop-color="#c0a88e"/>
    </linearGradient>
    <linearGradient id="card-img-4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c9d0"/>
      <stop offset="100%" stop-color="#9ab0ba"/>
    </linearGradient>
    <linearGradient id="card-img-5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4c8b8"/>
      <stop offset="100%" stop-color="#bfb09e"/>
    </linearGradient>
    <linearGradient id="card-img-6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8b8d4"/>
      <stop offset="100%" stop-color="#b09ebe"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="370" height="300" rx="12"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="800" fill="#f7f0e6"/>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#e8e0d4"/>
  <rect x="180" y="10" width="920" height="22" rx="11" fill="#d9d1c5"/>
  <circle cx="24" cy="20" r="6" fill="#ff6057"/>
  <circle cx="48" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="20" r="6" fill="#28c840"/>
  <text x="640" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8a7d6e">localhost:3000</text>

  <!-- App starts below chrome -->
  <!-- Header -->
  <rect x="0" y="40" width="1280" height="56" fill="rgba(247,240,230,0.95)"/>
  <line x1="0" y1="96" x2="1280" y2="96" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
  <!-- Logo mark -->
  <circle cx="36" cy="68" r="12" fill="none" stroke="#b84c21" stroke-width="1"/>
  <path d="M36 62 C36 62 32 66 32 69 C32 72 34 74 36 74 C38 74 40 72 40 69 C40 66 36 62 36 62Z" fill="#b84c21" opacity="0.15"/>
  <path d="M36 64 L36 74 M33 67 Q36 66 39 67" stroke="#b84c21" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Site label -->
  <text x="56" y="73" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#5a3e28">The Recipe Book</text>
  <!-- Google sign-in button -->
  <rect x="1100" y="54" width="160" height="30" rx="6" fill="#2c1f0e"/>
  <text x="1180" y="73" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#f7f0e6">Sign in with Google</text>

  <!-- Hero section -->
  <rect x="0" y="96" width="1280" height="200" fill="url(#hero-glow)"/>
  <text x="640" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#b84c21" opacity="0.9">A COLLECTION OF CHERISHED DISHES</text>
  <text x="640" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-style="italic" font-weight="700" fill="#2c1f0e">The Recipe Book</text>
  <text x="640" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#5a3e28">Handcrafted recipes passed down, perfected over time, and gathered here for good keeping.</text>
  <!-- Hero divider -->
  <line x1="520" y1="268" x2="616" y2="268" stroke="#c49a3c" stroke-width="1"/>
  <text x="640" y="273" text-anchor="middle" font-family="serif" font-size="12" fill="#c49a3c">✦</text>
  <line x1="664" y1="268" x2="760" y2="268" stroke="#c49a3c" stroke-width="1"/>

  <!-- Tag filter bar -->
  <rect x="64" y="316" width="48" height="26" rx="13" fill="#2c1f0e"/>
  <text x="88" y="333" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f0e6">All</text>
  <rect x="120" y="316" width="72" height="26" rx="13" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
  <text x="156" y="333" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">Baking</text>
  <rect x="202" y="316" width="80" height="26" rx="13" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
  <text x="242" y="333" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">Vegetarian</text>
  <rect x="292" y="316" width="70" height="26" rx="13" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
  <text x="327" y="333" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">Desserts</text>
  <rect x="372" y="316" width="64" height="26" rx="13" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
  <text x="404" y="333" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">Dinner</text>

  <!-- Section header -->
  <text x="64" y="390" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#2c1f0e">All Recipes</text>
  <text x="178" y="390" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.6">6 recipes</text>
  <rect x="1100" y="372" width="116" height="32" rx="7" fill="#b84c21"/>
  <text x="1158" y="392" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#fff">+ Add Recipe</text>

  <!-- Recipe Cards Row 1 -->
  <!-- Card 1 -->
  <g transform="translate(64, 412)" filter="url(#shadow-card)">
    <rect width="370" height="300" rx="12" fill="#fff"/>
    <rect width="370" height="170" rx="12" fill="url(#card-img-1)"/>
    <rect y="158" width="370" height="12" rx="0" fill="url(#card-img-1)"/>
    <!-- herb icon on placeholder -->
    <circle cx="185" cy="85" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="185" y="93" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.5)">🌿</text>
    <!-- tag overlay -->
    <rect x="10" y="146" width="56" height="16" rx="8" fill="rgba(44,31,14,0.7)"/>
    <text x="38" y="157" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f7f0e6">Baking</text>
    <!-- content -->
    <text x="16" y="202" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#2c1f0e">Lemon Drizzle Cake</text>
    <text x="16" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">8 servings</text>
    <text x="90" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">· 9 ingredients</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(454, 412)" filter="url(#shadow-card)">
    <rect width="370" height="300" rx="12" fill="#fff"/>
    <rect width="370" height="170" rx="12" fill="url(#card-img-2)"/>
    <rect y="158" width="370" height="12" fill="url(#card-img-2)"/>
    <circle cx="185" cy="85" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="185" y="93" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.5)">🥗</text>
    <rect x="10" y="146" width="70" height="16" rx="8" fill="rgba(44,31,14,0.7)"/>
    <text x="45" y="157" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f7f0e6">Vegetarian</text>
    <rect x="88" y="146" width="60" height="16" rx="8" fill="rgba(44,31,14,0.7)"/>
    <text x="118" y="157" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f7f0e6">Dinner</text>
    <text x="16" y="202" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#2c1f0e">Wild Mushroom Risotto</text>
    <text x="16" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">4 servings</text>
    <text x="86" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">· 11 ingredients</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(844, 412)" filter="url(#shadow-card)">
    <rect width="370" height="300" rx="12" fill="#fff"/>
    <rect width="370" height="170" rx="12" fill="url(#card-img-3)"/>
    <rect y="158" width="370" height="12" fill="url(#card-img-3)"/>
    <circle cx="185" cy="85" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="185" y="93" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.5)">🍋</text>
    <rect x="10" y="146" width="60" height="16" rx="8" fill="rgba(44,31,14,0.7)"/>
    <text x="40" y="157" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f7f0e6">Desserts</text>
    <text x="16" y="202" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#2c1f0e">Classic Lemon Tart</text>
    <text x="16" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">6 servings</text>
    <text x="86" y="222" font-family="sans-serif" font-size="11" fill="#5a3e28" opacity="0.75">· 8 ingredients</text>
  </g>
</svg>
