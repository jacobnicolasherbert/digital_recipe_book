<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <filter id="panel-shadow">
      <feDropShadow dx="-8" dy="0" stdDeviation="20" flood-color="rgba(44,31,14,0.18)"/>
    </filter>
    <linearGradient id="bg-blur" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f0e6"/>
      <stop offset="60%" stop-color="#f0e8d8"/>
    </linearGradient>
    <linearGradient id="upload-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede0cc"/>
      <stop offset="100%" stop-color="#d9c9b0"/>
    </linearGradient>
    <linearGradient id="ai-msg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede0cc"/>
      <stop offset="100%" stop-color="#e8d8c0"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="1280" height="40" fill="#e8e0d4"/>
  <circle cx="24" cy="20" r="6" fill="#ff6057"/>
  <circle cx="48" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="20" r="6" fill="#28c840"/>
  <rect x="180" y="10" width="920" height="22" rx="11" fill="#d9d1c5"/>
  <text x="640" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8a7d6e">localhost:3000</text>

  <!-- Background page (dimmed) -->
  <rect x="0" y="40" width="1280" height="760" fill="url(#bg-blur)"/>
  <rect x="0" y="40" width="1280" height="760" fill="rgba(44,31,14,0.4)"/>

  <!-- ── Slide-in panel (right side) ── -->
  <g filter="url(#panel-shadow)">
    <rect x="700" y="40" width="580" height="760" fill="#f7f0e6"/>

    <!-- Panel header (sticky) -->
    <rect x="700" y="40" width="580" height="64" fill="rgba(247,240,230,0.97)"/>
    <line x1="700" y1="104" x2="1280" y2="104" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
    <text x="732" y="78" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#2c1f0e">New Recipe</text>
    <circle cx="1248" cy="72" r="14" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="1248" y="76" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a3e28">✕</text>

    <!-- Image upload area -->
    <rect x="720" y="120" width="540" height="130" rx="10" fill="none" stroke="#d9c9b0" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="1000" y="170" text-anchor="middle" font-size="28" fill="#c4b49a">📷</text>
    <text x="1000" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8a7060">Click to add a photo</text>
    <text x="1000" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8a7060" opacity="0.6">JPEG, PNG, WebP — max 5 MB</text>

    <!-- Recipe name field -->
    <text x="720" y="278" font-family="sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#5a3e28" opacity="0.75">RECIPE NAME *</text>
    <rect x="720" y="286" width="540" height="36" rx="7" fill="#fff" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="734" y="309" font-family="Georgia, serif" font-size="13" fill="#2c1f0e">Sourdough Focaccia</text>

    <!-- Servings -->
    <text x="720" y="348" font-family="sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#5a3e28" opacity="0.75">SERVINGS</text>
    <rect x="720" y="356" width="160" height="36" rx="7" fill="#fff" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="734" y="379" font-family="Georgia, serif" font-size="13" fill="#2c1f0e">8</text>

    <!-- Ingredients textarea -->
    <text x="720" y="420" font-family="sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#5a3e28" opacity="0.75">INGREDIENTS <tspan font-weight="400" letter-spacing="0" font-size="10" opacity="0.7">— one per line</tspan></text>
    <rect x="720" y="428" width="540" height="108" rx="7" fill="#fff" stroke="#b84c21" stroke-width="1.5"/>
    <rect x="719" y="427" width="542" height="110" rx="7" fill="none" stroke="rgba(184,76,33,0.12)" stroke-width="3"/>
    <text x="734" y="449" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">500g strong white flour</text>
    <text x="734" y="468" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">380ml warm water</text>
    <text x="734" y="487" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">10g fine sea salt</text>
    <text x="734" y="506" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">7g active dry yeast</text>
    <text x="734" y="525" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">4 tbsp olive oil</text>

    <!-- Tags -->
    <text x="720" y="562" font-family="sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#5a3e28" opacity="0.75">TAGS</text>
    <!-- Tag chips -->
    <rect x="720" y="570" width="56" height="24" rx="12" fill="#2c1f0e"/>
    <text x="748" y="585" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f7f0e6">Baking</text>
    <rect x="784" y="570" width="70" height="24" rx="12" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="819" y="585" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a3e28">Vegetarian</text>
    <rect x="862" y="570" width="62" height="24" rx="12" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="893" y="585" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a3e28">Desserts</text>
    <rect x="932" y="570" width="56" height="24" rx="12" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="960" y="585" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a3e28">Dinner</text>
    <rect x="996" y="570" width="68" height="24" rx="12" fill="#2c1f0e"/>
    <text x="1030" y="585" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f7f0e6">Bread</text>

    <!-- Guest notice -->
    <rect x="720" y="614" width="540" height="48" rx="8" fill="rgba(196,154,60,0.1)" stroke="rgba(196,154,60,0.3)" stroke-width="1"/>
    <text x="738" y="635" font-family="sans-serif" font-size="12">👤</text>
    <text x="758" y="634" font-family="sans-serif" font-size="11" fill="#5a3e28">Not signed in — this recipe will appear this session only.</text>
    <text x="758" y="650" font-family="sans-serif" font-size="11" font-weight="600" fill="#2c1f0e">Sign in with Google to save it permanently.</text>

    <!-- Action buttons -->
    <rect x="720" y="680" width="166" height="42" rx="7" fill="none" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="803" y="705" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5a3e28">Cancel</text>
    <rect x="896" y="680" width="364" height="42" rx="7" fill="#b84c21"/>
    <text x="1078" y="705" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#fff">Add to cookbook</text>
  </g>

  <!-- ── AI Substitution panel floating on left ── -->
  <g>
    <rect x="32" y="90" width="440" height="360" rx="14" fill="#f7f0e6" stroke="rgba(44,31,14,0.12)" stroke-width="1"/>
    <!-- Panel toggle header -->
    <rect x="32" y="90" width="440" height="50" rx="14" fill="rgba(196,154,60,0.07)"/>
    <rect x="32" y="118" width="440" height="22" fill="rgba(196,154,60,0.07)"/>
    <text x="56" y="121" font-family="serif" font-size="12" fill="#c49a3c">✦</text>
    <text x="76" y="121" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#2c1f0e">Ask about substitutions</text>
    <text x="380" y="121" font-family="sans-serif" font-size="9" fill="#5a3e28" opacity="0.55">DeepSeek AI</text>
    <text x="456" y="121" font-family="sans-serif" font-size="10" fill="#5a3e28">∧</text>
    <line x1="32" y1="140" x2="472" y2="140" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>

    <!-- Messages area -->
    <!-- User message bubble -->
    <rect x="260" y="154" width="196" height="36" rx="10" fill="#2c1f0e"/>
    <text x="358" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f0e6">Can I replace the butter</text>
    <text x="358" y="184" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f0e6">with olive oil?</text>

    <!-- AI response -->
    <text x="54" y="212" font-family="serif" font-size="11" fill="#c49a3c">✦</text>
    <rect x="68" y="200" width="380" height="80" rx="10" fill="url(#ai-msg-bg)"/>
    <text x="82" y="218" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">Yes! Olive oil works well here — use about</text>
    <text x="82" y="234" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">¾ of the butter quantity. It'll give a slightly</text>
    <text x="82" y="250" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">richer flavour and a softer crumb. Extra-virgin</text>
    <text x="82" y="266" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">works best for focaccia specifically.</text>

    <!-- Second user message -->
    <rect x="264" y="294" width="192" height="24" rx="10" fill="#2c1f0e"/>
    <text x="360" y="309" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f0e6">What about a vegan egg swap?</text>

    <!-- Streaming AI response -->
    <text x="54" y="338" font-family="serif" font-size="11" fill="#c49a3c">✦</text>
    <rect x="68" y="326" width="360" height="38" rx="10" fill="url(#ai-msg-bg)"/>
    <text x="82" y="342" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">For each egg, try 3 tbsp aquafaba (the</text>
    <text x="82" y="358" font-family="Georgia, serif" font-size="12" fill="#2c1f0e">liquid from a can of chickpeas)...</text>
    <!-- Blinking cursor -->
    <rect x="321" y="350" width="2" height="11" rx="1" fill="#b84c21" opacity="0.85"/>

    <!-- Input row -->
    <line x1="32" y1="380" x2="472" y2="380" stroke="rgba(44,31,14,0.08)" stroke-width="1"/>
    <rect x="42" y="388" width="374" height="38" rx="8" fill="#fff" stroke="rgba(44,31,14,0.18)" stroke-width="1"/>
    <text x="58" y="411" font-family="Georgia, serif" font-size="11" fill="#8a7060" opacity="0.6">e.g. I'm lactose intolerant — what replaces the cream?</text>
    <rect x="424" y="390" width="36" height="34" rx="7" fill="#b84c21"/>
    <text x="442" y="411" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">➤</text>

    <!-- Disclaimer -->
    <text x="252" y="447" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a3e28" opacity="0.45">AI suggestions — always use your own judgement.</text>
  </g>
</svg>
